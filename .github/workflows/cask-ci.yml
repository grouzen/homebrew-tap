name: Cask CI

on:
  pull_request:

jobs:
  discover-casks:
    runs-on: macos-14
    outputs:
      casks: ${{ steps.discover.outputs.casks }}
    env:
      HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify runner architecture
        run: test "$(uname -m)" = "arm64"

      - name: Discover casks
        id: discover
        shell: bash
        run: |
          cask_paths=$(find Casks -maxdepth 1 -name '*.rb' -print | sort)
          if [ -z "$cask_paths" ]; then
            echo "casks=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          json=$(printf '%s\n' "$cask_paths" | ruby -rjson -e 'puts STDIN.each_line(chomp: true).map { |path|
            File.basename(path, ".rb")
          }.to_json')
          echo "casks=$json" >> "$GITHUB_OUTPUT"

  validate-tap:
    runs-on: macos-14
    needs: discover-casks
    env:
      TAP_NAME: grouzen/tap
      HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify runner architecture
        run: test "$(uname -m)" = "arm64"

      - name: Update Homebrew
        run: brew update

      - name: Tap repository
        run: brew tap "$TAP_NAME" "$GITHUB_WORKSPACE"

      - name: Audit all casks
        run: brew audit --cask --strict --online --tap "$TAP_NAME"

      - name: Check cask style
        run: brew style --cask "$TAP_NAME"

  smoke-test-casks:
    runs-on: macos-14
    needs: discover-casks
    if: ${{ needs.discover-casks.outputs.casks != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        cask: ${{ fromJson(needs.discover-casks.outputs.casks) }}
    env:
      TAP_NAME: grouzen/tap
      HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify runner architecture
        run: test "$(uname -m)" = "arm64"

      - name: Update Homebrew
        run: brew update

      - name: Tap repository
        run: brew tap "$TAP_NAME" "$GITHUB_WORKSPACE"

      - name: Fetch cask artifact
        run: brew fetch --cask "$TAP_NAME/${{ matrix.cask }}" --retry

      - name: Install cask
        run: brew install --cask "$TAP_NAME/${{ matrix.cask }}"

      - name: Verify installed cask
        run: brew list --cask "$TAP_NAME/${{ matrix.cask }}"
